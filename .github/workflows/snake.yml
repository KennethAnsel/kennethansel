name: Generate Rainbow Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: KennethAnsel

          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=ff0000,ff7f00,ffff00,00ff00,0000ff,4b0082,8f00ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00f5ff,00ff9f,ffff00,ff00ff,ff4d4d,7a00ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
